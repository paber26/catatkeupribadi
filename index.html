<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jurnal Keuangan Bersama</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #f1f5f9;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Iframe membungkus Web App Google Apps Script untuk menyembunyikan banner -->
  <div style="width: 100%; height: 100vh; overflow: hidden; position: relative;">
    <iframe src="https://script.google.com/macros/s/AKfycbxQQ7DoNtR-TBm0ggq9IDwfqltSdoAxfcIZ6ZTom1JZk6tYT2idptXLayL7tr_Hj0SJ/exec" 
            style="position: absolute; top: -45px; left: 0; width: 100%; height: calc(100vh + 45px); border: none;">
    </iframe>
  </div>
</body>
</html>
